<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国試回数指定クイズ</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .header-info {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    #questionText {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .option {
      width: 100%;
      padding: 1rem;
      margin-bottom: 0.8rem;
      background: #28a745; /* 基本は緑 */
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      font-size: 1rem;
    }
    /* 正解＝赤（ウデ試しモード準拠） */
    .correct { background: #dc3545 !important; }
    /* 不正解＝青（ウデ試しモード準拠） */
    .wrong { background: #0275d8 !important; }

    #nextBtn {
      width: 100%;
      padding: 1rem;
      background: #6c757d;
      color: white;
      border: none;
      border-radius: 6px;
      display: none;
      cursor: pointer;
      margin-top: 1rem;
      font-weight: bold;
    }
    #judgeText {
      font-weight: bold;
      margin-bottom: 0.5rem;
      text-align: center;
      font-size: 1.2rem;
    }
    .correctText { color: #dc3545; }
    .wrongText { color: #0275d8; }

    #explanation {
      display: none;
      background: #eee;
      padding: 1rem;
      border-radius: 6px;
      margin-top: 0.5rem;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .lightgray-btn {
      background: #dcdcdc;
      color: #333;
      border: none;
      border-radius: 6px;
      padding: 1rem;
      width: 100%;
      margin-top: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container" id="quizScreen">
  <div class="header-info" id="quizInfo">読み込み中...</div>
  <p id="progress" style="text-align:center; font-weight:bold;"></p>
  <h2 id="questionText"></h2>

  <div id="options"></div>
  <div id="judgeText" style="display:none;"></div>
  <div id="explanation"></div>

  <button id="nextBtn" onclick="nextQuestion()">次の問題へ</button>
</div>

<div class="container" id="resultScreen" style="display:none;">
  <h2 style="text-align:center;">結果</h2>
  <p id="scoreText" style="text-align:center; font-size:1.1rem;"></p>
  <button class="lightgray-btn" onclick="location.href='kaisu_select.html'">回数指定に戻る</button>
  <button class="lightgray-btn" onclick="location.href='mode.html'">トップに戻る</button>
</div>

<script>
  let questions = [];
  let index = 0;
  let correctCount = 0;

  const targetKaisu = localStorage.getItem("targetKaisu");
  const targetSubject = localStorage.getItem("targetSubject");

  document.getElementById("quizInfo").textContent = `第${targetKaisu}回 - ${targetSubject}`;

  fetch("quizzes.json")
    .then(res => res.json())
    .then(data => {
      // フィルタリング
      if (targetSubject === "すべて") {
        questions = data.filter(q => String(q.kaisu).includes(targetKaisu));
      } else {
        questions = data.filter(q => String(q.kaisu).includes(targetKaisu) && q.subject === targetSubject);
      }

      if (questions.length === 0) {
        alert("該当する問題が見つかりませんでした。");
        location.href = "kaisu_select.html";
        return;
      }

      // ランダムに並び替え
      questions.sort(() => Math.random() - 0.5);
      showQuestion();
    })
    .catch(err => {
      console.error(err);
      alert("データの取得に失敗しました。");
    });

  function showQuestion() {
    const q = questions[index];
    document.getElementById("progress").textContent = `第${index + 1}問 / 全${questions.length}問`;
    document.getElementById("questionText").textContent = q.question;
    document.getElementById("judgeText").style.display = "none";
    document.getElementById("explanation").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";

    const optDiv = document.getElementById("options");
    optDiv.innerHTML = "";

    q.options.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.className = "option";
      btn.textContent = `${i + 1}. ${opt}`;
      // ボタンクリック時に正誤判定（1-indexed）
      btn.onclick = () => checkAnswer(i + 1);
      optDiv.appendChild(btn);
    });
  }

  function checkAnswer(selectedIdx) {
    const q = questions[index];
    const btns = document.querySelectorAll(".option");
    btns.forEach(btn => btn.disabled = true);

    const judge = document.getElementById("judgeText");
    const expArea = document.getElementById("explanation");

    // 正解番号を数値として取得（JSONのanswerが文字列の場合を考慮）
    const correctAnswerNum = Number(q.answer);

    if (selectedIdx === correctAnswerNum) {
      correctCount++;
      btns[selectedIdx - 1].classList.add("correct"); // 正解＝赤
      judge.textContent = "正解！";
      judge.className = "correctText";
    } else {
      btns[selectedIdx - 1].classList.add("wrong"); // 選んだ不正解＝青
      if (btns[correctAnswerNum - 1]) {
        btns[correctAnswerNum - 1].classList.add("correct"); // 正解の選択肢を表示
      }
      judge.textContent = "不正解…";
      judge.className = "wrongText";
    }

    judge.style.display = "block";

    // ✅ 解説の整形： 「・」をすべて削除し、つなげて表示する
    const formattedExp = q.explanation ? q.explanation.replace(/・/g, "") : "解説はありません。";
    expArea.innerHTML = `<strong>【解説】</strong><br>${formattedExp}`;
    expArea.style.display = "block";

    document.getElementById("nextBtn").style.display = "block";
  }

  function nextQuestion() {
    index++;
    if (index >= questions.length) {
      showResult();
      return;
    }
    showQuestion();
  }

  function showResult() {
    document.getElementById("quizScreen").style.display = "none";
    const resultScreen = document.getElementById("resultScreen");
    resultScreen.style.display = "block";

    const rate = Math.round((correctCount / questions.length) * 100);
    document.getElementById("scoreText").textContent = 
      `正解数：${correctCount} / ${questions.length}（正答率：${rate}%）`;
  }
</script>

</body>
</html>
